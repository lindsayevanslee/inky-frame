name: run belcourt spider

on:
  # Scheduling moved to cron-job.org, which fires an HTTP request to GitHub's
  # workflow_dispatch API at a precise time. GitHub's native `schedule:` cron
  # runs best-effort and is frequently delayed (often 30+ min, worse near the
  # top of the hour), so an external trigger gives us reliable on-time runs.
  # cron-job.org also honors a timezone, so we get 5:07am Central year-round
  # with no DST drift. The old GitHub cron is kept below for easy restore.
  #
  # schedule:
  #   # 10:07 UTC = ~5:07am Central (CDT). Best-effort / often delayed.
  #   - cron: '7 10 * * *'
  workflow_dispatch: # manual trigger + cron-job.org external trigger

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:

      - name: checkout repo content
        uses: actions/checkout@v6 # checkout the repository content to github runner

      - name: setup conda
        uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: inkyenv
          environment-file: environment.yml
          python-version: 3.11
          auto-activate: false # renamed from deprecated auto-activate-base; inkyenv is activated via activate-environment above
          auto-update-conda: true
      
      - name: check conda
        run: |
          conda info
          conda list
          conda config --show-sources
          conda config --show
     
      - name: execute spider script # run showtimes.py
        run: |
          cd belcourt/belcourt/spiders
          # CLOSESPIDER_ERRORCOUNT=1 makes scrapy exit non-zero if anything is
          # logged at ERROR/CRITICAL (e.g. the Twisted ImportError), so a broken
          # crawl fails the build instead of silently committing stale output.
          scrapy runspider showtimes.py -O ../../output_showtimes.json \
            --set=CLOSESPIDER_ERRORCOUNT=1

      - name: generate jpg # run belcourt_generate_image.py
        run: |
          cd belcourt
          python belcourt_generate_image.py
          
      - name: commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || (git commit -a -m "Ran belcourt spider" --allow-empty)
          
      - name: push changes
        uses: ad-m/github-push-action@v1.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main 